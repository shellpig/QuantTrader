system:
  data_dir: ./data
  log_level: INFO
  timezone: Asia/Taipei
data:
  primary_source: finmind
  fallback_source: yfinance
backtest:
  commission_rate: 0.001425
  commission_discount: 0.6
  tax_rate: 0.003
  etf_tax_rate: 0.001
  slippage_ticks: 1
  initial_capital: 1000000.0
strategies:
- name: 定期定額
  type: dollar_cost_averaging
  params:
    monthly_day: 5
    monthly_amount: 10000.0
    min_buy_unit: 1
    non_trading_day_policy: next_trading_day
    buy_price_field: close
- name: RSI_14
  type: rsi
  params:
    period: 14
    oversold: 30.0
    overbought: 70.0
- name: KD_Cross
  type: kd_cross
  params:
    k_period: 9
    d_period: 3
    smooth_k: 3
- name: MACD_Cross
  type: macd_cross
  params:
    fast: 12
    slow: 26
    signal: 9
- name: BB_20
  type: bollinger_band
  params:
    period: 20
    std_dev: 2.0
- name: BIAS_20
  type: bias
  params:
    ma_period: 20
    buy_bias: -10.0
    sell_bias: 10.0
- name: Donchian_20_10
  type: donchian_breakout
  params:
    entry_period: 20
    exit_period: 10
- name: MA20_MA60
  type: moving_average_cross
  params:
    short_window: 20
    long_window: 60
ai:
  enabled: false
  provider: anthropic
  model: claude-sonnet-4-6
ui:
  theme: midnight_blue
  use_extras: true
  use_option_menu: true
realtime:
  cache_ttl: 10
  request_timeout: 5
risk:
  max_daily_loss_pct: 0.03
  max_position_pct: 0.2
  max_drawdown_warning_pct: 0.1
